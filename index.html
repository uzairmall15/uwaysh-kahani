<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Uwaysh's Kahani</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
text-align:center;
}

.hero{
height:100vh;
background:url("hero.png") center/contain no-repeat;
background-color:#0b0b0b;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.hero h1{
font-size:42px;
}

.startBtn{
margin-top:30px;
padding:14px 30px;
font-size:18px;
background:#ff8c00;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

.section{
display:none;
padding:50px 20px;
max-width:900px;
margin:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-top:40px;
}

.stage{
background:#141414;
border-radius:10px;
padding:30px;
cursor:pointer;
transition:.3s;
}

.stage.locked{
opacity:.3;
cursor:not-allowed;
}

.stage:hover:not(.locked){
transform:scale(1.05);
background:#ff8c00;
}

.box{
font-size:40px;
margin-bottom:10px;
}

.card{
display:none;
background:#141414;
padding:30px;
border-radius:10px;
margin-top:40px;
}

.card img{
max-width:320px;
border-radius:10px;
margin-top:20px;
}

.back{
margin-top:20px;
padding:10px 20px;
border:none;
background:#ff8c00;
color:white;
border-radius:6px;
cursor:pointer;
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

@media(max-width:600px){

.grid{
grid-template-columns:repeat(3,1fr);
}

}

</style>

</head>

<body>

<canvas id="confetti"></canvas>

<div class="hero">

<h1>🌍 Uwaysh's Kahani</h1>
<p>13 stages. 13 gifts. One unforgettable journey.</p>

<button class="startBtn" onclick="startJourney()">
START THE JOURNEY
</button>

</div>


<div class="section" id="journey">

<h2>EID MUBARAK 🌙</h2>

<p><b>THE UNEXPECTED JOURNEY 🔥</b></p>

<p>Follow the stages in order.</p>

<div class="grid" id="grid"></div>

</div>

<div id="cards"></div>


<script>

const gifts=[

["Football Socks","We’re starting strong. Completely unrelated to everything else."],

["Rubber Gloves","Now we start looking the part."],

["Wipes","Things are about to get messy."],

["Apron","Put this on and suddenly everyone assumes you know what you're doing."],

["Spray Bottle","A true master knows one rule: keep things juicy."],

["Spatula Set","Now we're getting serious."],

["Small Burger Press","Purely for the little one someday."],

["Small Dome","Again… purely for the little one someday."],

["Burger Press","For doing things properly."],

["Big Dome","The secret weapon."],

["Coal","The heart of it all."],

["Cast Iron Plate","Now you're performing."],

["BBQ","Your journey begins now 🔥"]

]

let unlocked=1


function startJourney(){

document.querySelector(".hero").style.display="none"
document.getElementById("journey").style.display="block"

buildStages()

}


function buildStages(){

const grid=document.getElementById("grid")

for(let i=1;i<=13;i++){

let div=document.createElement("div")

div.className="stage"

if(i>unlocked) div.classList.add("locked")

div.innerHTML=`<div class="box">📦</div>${i}`

div.onclick=()=>openStage(i)

grid.appendChild(div)

}

}



function openStage(n){

if(n>unlocked) return

showCard(n)

if(n===unlocked && unlocked<13){

unlocked++

updateLocks()

}

if(n===13){

confetti()

}

}



function updateLocks(){

document.querySelectorAll(".stage").forEach((el,i)=>{

if(i+1<=unlocked){

el.classList.remove("locked")

el.querySelector(".box").innerHTML="🎁"

}

})

}



function showCard(n){

const cards=document.getElementById("cards")

cards.innerHTML=""

let div=document.createElement("div")

div.className="card"
div.style.display="block"

let content=`<h2>${n}️⃣ ${gifts[n-1][0]}</h2>
<p>${gifts[n-1][1]}</p>`

if(n===13){

content+=`<img src="bbq.png">`

}

content+=`<br><button class="back" onclick="closeCard()">Back</button>`

div.innerHTML=content

cards.appendChild(div)

window.scrollTo({top:0,behavior:"smooth"})

}



function closeCard(){

document.getElementById("cards").innerHTML=""

}



function confetti(){

const canvas=document.getElementById("confetti")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let pieces=[]

for(let i=0;i<200;i++){

pieces.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*6+4,
speed:Math.random()*3+2

})

}

function update(){

ctx.clearRect(0,0,canvas.width,canvas.height)

pieces.forEach(p=>{

ctx.fillStyle=`hsl(${Math.random()*360},100%,50%)`
ctx.fillRect(p.x,p.y,p.size,p.size)

p.y+=p.speed

})

requestAnimationFrame(update)

}

update()

}

</script>

</body>
</html>
