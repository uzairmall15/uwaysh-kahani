<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Uwaysh's Kahani</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0b0b0b;
color:white;
text-align:center;
}

/* INTRO */

.intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999;
}

.intro h1{
font-size:42px;
margin-bottom:10px;
}

/* HERO */

.hero{
height:100vh;
background:url("hero.png") center/contain no-repeat;
background-color:#0b0b0b;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.startBtn{
margin-top:30px;
padding:14px 30px;
font-size:18px;
background:#ff8c00;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

/* GRID */

.section{
display:none;
padding:40px 20px;
max-width:900px;
margin:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-top:40px;
}

.stage{
background:#141414;
border-radius:10px;
padding:30px;
cursor:pointer;
transition:.3s;
}

.stage.locked{
opacity:.3;
cursor:not-allowed;
}

.stage:hover:not(.locked){
transform:scale(1.05);
background:#ff8c00;
}

.box{
font-size:40px;
margin-bottom:10px;
}

/* FULLSCREEN */

.fullscreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0b0b0b;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
padding:30px;
z-index:1000;
}

.fullscreen img{
max-width:350px;
border-radius:10px;
margin-top:20px;
}

.btn{
padding:12px 25px;
border:none;
background:#ff8c00;
color:white;
border-radius:6px;
margin:10px;
cursor:pointer;
font-size:16px;
}

/* CONFETTI */

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

@media(max-width:600px){
.grid{
grid-template-columns:repeat(3,1fr);
}
}

</style>

</head>

<body>

<canvas id="confetti"></canvas>

<!-- INTRO -->

<div class="intro" id="intro">

<h1>EID MUBARAK 🌙</h1>
<p>The Unexpected Journey Begins...</p>

<button class="startBtn" onclick="enterSite()">
ENTER
</button>

<audio id="eidMusic" loop>
<source src="eid.mp3" type="audio/mpeg">
</audio>

</div>

<!-- HERO -->

<div class="hero" id="hero">

<h1>🌍 Uwaysh's Kahani</h1>
<p>13 stages. 13 gifts. One unforgettable journey.</p>

<button class="startBtn" onclick="startJourney()">
START THE JOURNEY
</button>

</div>

<!-- GRID -->

<div class="section" id="journey">

<h2>THE UNEXPECTED JOURNEY 🔥</h2>
<p>Open the gifts in order.</p>

<div class="grid" id="grid"></div>

</div>

<!-- FULLSCREEN STAGE -->

<div class="fullscreen" id="stageScreen">

<h2 id="giftTitle"></h2>
<p id="giftText"></p>

<img id="bbqImage" src="bbq.png" style="display:none">

<div>

<button class="btn" onclick="backToGrid()">Back</button>
<button class="btn" onclick="nextStage()">Next</button>
<button class="btn" onclick="exitJourney()">Exit</button>

</div>

</div>


<script>

/* MUSIC START */

function enterSite(){

document.getElementById("eidMusic").play()

document.getElementById("intro").style.display="none"
document.getElementById("hero").style.display="flex"

}

/* GIFTS */

const gifts=[

["1️⃣ Football Socks","Completely unrelated. Just thought you'd like them."],

["2️⃣ Rubber Gloves","Now we start looking the part."],

["3️⃣ Wipes","Things are about to get messy."],

["4️⃣ Apron","Put this on and suddenly everyone assumes you're a professional."],

["5️⃣ Spray Bottle","A true master knows one rule: keep things juicy."],

["6️⃣ Spatula Set","Now we're getting serious."],

["7️⃣ Small Burger Press","For the little one someday."],

["8️⃣ Small Dome","Again… purely for the little one."],

["9️⃣ Burger Press","For doing things properly."],

["🔟 Big Dome","The secret weapon."],

["1️⃣1️⃣ Coal","The heart of it all."],

["1️⃣2️⃣ Cast Iron Plate","Now you're performing."],

["1️⃣3️⃣ THE BBQ","Your journey begins now 🔥"]

]

let unlocked=1
let currentStage=1

/* START JOURNEY */

function startJourney(){

document.getElementById("eidMusic").pause()

document.getElementById("hero").style.display="none"
document.getElementById("journey").style.display="block"

buildStages()

}

/* BUILD GRID */

function buildStages(){

const grid=document.getElementById("grid")
grid.innerHTML=""

for(let i=1;i<=13;i++){

let div=document.createElement("div")

div.className="stage"

if(i>unlocked) div.classList.add("locked")

div.innerHTML=`<div class="box">📦</div>${i}`

div.onclick=()=>openStage(i)

grid.appendChild(div)

}

}

/* OPEN STAGE */

function openStage(n){

if(n>unlocked) return

currentStage=n

if(n<13){

new Audio("open.mp3").play()

}

document.getElementById("giftTitle").innerText=gifts[n-1][0]
document.getElementById("giftText").innerText=gifts[n-1][1]

document.getElementById("stageScreen").style.display="flex"
document.getElementById("journey").style.display="none"

if(n===13){

document.getElementById("bbqImage").style.display="block"

new Audio("celebration.mp3").play()

confetti()

}else{

document.getElementById("bbqImage").style.display="none"

}

}

/* BACK */

function backToGrid(){

document.getElementById("stageScreen").style.display="none"
document.getElementById("journey").style.display="block"

}

/* NEXT */

function nextStage(){

if(currentStage<13){

unlocked=Math.max(unlocked,currentStage+1)

buildStages()

backToGrid()

}

}

/* EXIT */

function exitJourney(){

document.getElementById("stageScreen").style.display="none"
document.getElementById("journey").style.display="none"
document.getElementById("hero").style.display="flex"

}

/* CONFETTI */

function confetti(){

const canvas=document.getElementById("confetti")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let pieces=[]

for(let i=0;i<200;i++){

pieces.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*6+4,
speed:Math.random()*3+2

})

}

function update(){

ctx.clearRect(0,0,canvas.width,canvas.height)

pieces.forEach(p=>{

ctx.fillStyle=`hsl(${Math.random()*360},100%,50%)`
ctx.fillRect(p.x,p.y,p.size,p.size)

p.y+=p.speed

})

requestAnimationFrame(update)

}

update()

}

</script>

</body>
</html>
